version: "3.9"

services:
  # ────────────────────────────────────────────────────────────────────────────
  # PostgreSQL database
  # ────────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-wellness}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required — set it in a .env file}
      POSTGRES_DB: ${DB_NAME:-wellness_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wellness} -d ${DB_NAME:-wellness_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────────────────────────
  # FastAPI backend
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-wellness}:${DB_PASSWORD}@db:5432/${DB_NAME:-wellness_db}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required — set it in a .env file}
      LOG_LEVEL: INFO
      DEBUG: "false"
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - model_cache:/root/.cache/huggingface

  # ────────────────────────────────────────────────────────────────────────────
  # Next.js frontend (development — production deploys to Vercel)
  # ────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  model_cache:
