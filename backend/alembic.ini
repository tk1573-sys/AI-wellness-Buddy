# Alembic configuration file for AI Wellness Buddy backend.
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts, relative to this file.
script_location = alembic

# Template used to generate migration file names.
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps (UTC).
timezone = UTC

# Truncate long revision messages in filenames.
truncate_slug_length = 40

# Output encoding for migration scripts.
output_encoding = utf-8

# The SQLAlchemy URL is resolved at runtime from the DATABASE_URL env var
# inside env.py — do NOT hard-code credentials here.
sqlalchemy.url =

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
